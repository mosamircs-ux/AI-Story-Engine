kind = "web"
previewPath = "/"
title = "Novel World"
version = "1.0.0"
id = "artifacts/novel-world"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23698

[services.development]
run = "pnpm --filter @workspace/novel-world run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novel-world", "run", "build" ]
publicDir = "artifacts/novel-world/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23698"
BASE_PATH = "/"
