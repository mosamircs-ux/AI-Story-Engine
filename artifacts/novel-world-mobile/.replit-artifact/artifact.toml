kind = "mobile"
previewPath = "/mobile/"
title = "Novel World Mobile"
version = "1.0.0"
id = "artifacts/novel-world-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21547

[services.development]
run = "pnpm --filter @workspace/novel-world-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novel-world-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/novel-world-mobile", "run", "serve" ]

[services.env]
PORT = "21547"
BASE_PATH = "/mobile/"
